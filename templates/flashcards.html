<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>

<link rel="stylesheet" href="/static/style.css">

<style>

.flip-card{
    background:transparent;

    width:300px;
    height:200px;

    perspective:1000px;

    margin:20px auto;
}

.flip-inner{
    position:relative;

    width:100%;
    height:100%;

    text-align:center;

    transition:transform 0.6s;

    transform-style:preserve-3d;
}

.flip-card.flipped .flip-inner{
    transform:rotateY(180deg);
}

.flip-front,
.flip-back{

    position:absolute;

    width:100%;
    height:100%;

    backface-visibility:hidden;

    border-radius:16px;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    box-sizing:border-box;

    font-size:20px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(10px);

    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

.flip-back{
    transform:rotateY(180deg);
}

.delete-btn{
    margin-top:10px;

    padding:8px 14px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    font-size:16px;
}

</style>

</head>

<body>

<button onclick="toggleMode()" id="modeBtn"
style="position:fixed; top:15px; left:15px;">
🌙
</button>

<div id="globalTimer">⏱️ 00:00</div>

<button onclick="goHome()">⬅ Dashboard</button>

<h1>🧠 Flashcards</h1>

<!-- ADD CARD -->
<form method="POST">

<input
name="question"
placeholder="Question"
required>

<br>

<textarea
name="answer"
placeholder="Answer"
required></textarea>

<br>

<button type="submit">
Add Card
</button>

</form>

<hr>

<!-- FLASHCARDS -->

{% for c in cards %}

<div class="flip-card" onclick="flipCard(this)">

    <div class="flip-inner">

        <div class="flip-front">
            {{ c[2] }}
        </div>

        <div class="flip-back">

{{ c[3] }}

<br><br>


</a>

</div>

    </div>

</div>

<center>

<button class="delete-btn"
onclick="deleteCard('{{ c[0] }}')">
❌ Delete
</button>

</center>

{% endfor %}

<script>

function flipCard(card){
    card.classList.toggle("flipped");
}

function goHome(){
    window.location.href="/dashboard";
}

function deleteCard(id){

    window.location.href =
    "/delete_flashcard/" + id;
}

</script>

<script>
setInterval(()=>{

    let endTime =
    localStorage.getItem("timerEnd");

    if(!endTime){

        document.getElementById("globalTimer").innerText =
        "⏱️ 00:00";

        return;
    }

    let remaining = Math.max(
        0,
        Math.floor((endTime - Date.now())/1000)
    );

    let m = String(
        Math.floor(remaining/60)
    ).padStart(2,'0');

    let s = String(
        remaining%60
    ).padStart(2,'0');

    document.getElementById("globalTimer").innerText =
    `⏱️ ${m}:${s}`;

}, 500);
</script>

<script>
function toggleMode(){

    document.body.classList.toggle("light");

    let btn = document.getElementById("modeBtn");

    if(document.body.classList.contains("light")){

        localStorage.setItem("mode","light");

        btn.innerText = "🌙";

    } else {

        localStorage.setItem("mode","dark");

        btn.innerText = "☀️";
    }
}

document.addEventListener("DOMContentLoaded", function(){

    let btn = document.getElementById("modeBtn");

    let mode = localStorage.getItem("mode");

    if(mode === "light"){

        document.body.classList.add("light");

        btn.innerText = "🌙";

    } else {

        btn.innerText = "☀️";
    }
});
</script>

</body>
</html>
