<!DOCTYPE html>
<html>
<head>
<title>OTP Login</title>
<link rel="stylesheet" href="/static/otp.css">
</head>

<body>

<div class="container">

    <h1>📧 OTP Login</h1>

    <p>Enter your email to receive a verification code</p>

    <form method="POST">

        <input 
        type="email" 
        name="email" 
        placeholder="Enter email"
        required>

        <button type="submit">
            Send OTP
        </button>

    </form>

</div>

</body>
</html>
